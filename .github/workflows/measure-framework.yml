name: Measure Framework

on:
  workflow_call:
    inputs:
      install-matrix:
        description: 'JSON array of frameworks to measure install time'
        type: string
        required: true
      build-matrix:
        description: 'JSON array of frameworks to measure build time'
        type: string
        required: true
      ssr-request-throughput-matrix:
        description: 'JSON array of frameworks to measure SSR request throughput performance'
        type: string
        required: true
      deps-matrix:
        description: 'JSON array of frameworks to run e18e dependency analysis'
        type: string
        required: false
        default: '[]'
      client-side-rendered-matrix:
        description: 'JSON array of frameworks to measure client-side rendered paint and interaction performance'
        type: string
        required: false
        default: '[]'
      server-side-rendered-matrix:
        description: 'JSON array of frameworks to measure server-side rendered paint and interaction performance'
        type: string
        required: false
        default: '[]'

jobs:
  measure-install:
    if: inputs.install-matrix != '[]'
    runs-on: depot-ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        framework: ${{ fromJson(inputs.install-matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install stats-generator dependencies
        run: pnpm install --frozen-lockfile --filter @framework-tracker/stats-generator

      - name: Run install benchmark
        run: |
          RUN_FREQUENCY=$(echo '${{ toJson(matrix.framework) }}' | jq -r '.measurements[] | select(.type == "install") | .runFrequency')
          pnpm --filter @framework-tracker/stats-generator run:install ${{ matrix.framework.package }} $RUN_FREQUENCY

      - name: Upload install stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: install-stats-${{ matrix.framework.name }}
          path: packages/${{ matrix.framework.package }}/install-stats.json
          retention-days: 1
          if-no-files-found: error

  measure-build:
    if: inputs.build-matrix != '[]'
    runs-on: depot-ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        framework: ${{ fromJson(inputs.build-matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install package dependencies
        working-directory: ./packages/${{ matrix.framework.package }}
        run: pnpm install --frozen-lockfile

      - name: Run build benchmark
        run: |
          RUN_FREQUENCY=$(echo '${{ toJson(matrix.framework) }}' | jq -r '.measurements[] | select(.type == "build") | .runFrequency')
          pnpm --filter @framework-tracker/stats-generator run:build ${{ matrix.framework.package }} $RUN_FREQUENCY

      - name: Scan build output for vendored core-js
        run: pnpm --filter @framework-tracker/stats-generator run:corejs ${{ matrix.framework.package }}

      - name: Upload build stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-stats-${{ matrix.framework.name }}
          path: packages/${{ matrix.framework.package }}/build-stats.json
          retention-days: 1
          if-no-files-found: error

      - name: Upload core-js stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: corejs-stats-${{ matrix.framework.name }}
          path: packages/${{ matrix.framework.package }}/corejs-stats.json
          retention-days: 1
          if-no-files-found: warn

  measure-ssr-request-throughput:
    if: inputs.ssr-request-throughput-matrix != '[]'
    runs-on: depot-ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        framework: ${{ fromJson(inputs.ssr-request-throughput-matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install package dependencies
        working-directory: ./packages/${{ matrix.framework.package }}
        run: pnpm install --frozen-lockfile

      - name: Build app
        working-directory: ./packages/${{ matrix.framework.package }}
        run: pnpm build

      - name: Run SSR request throughput benchmark
        run: pnpm --filter @framework-tracker/stats-generator run:ssr-request-throughput ${{ matrix.framework.package }}
        env:
          RUNNER_LABEL: ubuntu-latest

      - name: Upload SSR request throughput stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ssr-request-throughput-stats-${{ matrix.framework.name }}
          path: packages/${{ matrix.framework.package }}/ci-stats.json
          retention-days: 1
          if-no-files-found: error

  measure-dependencies:
    if: inputs.deps-matrix != '[]'
    runs-on: depot-ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        framework: ${{ fromJson(inputs.deps-matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install package dependencies
        working-directory: ./packages/${{ matrix.framework.package }}
        run: pnpm install --frozen-lockfile

      - name: Run e18e analysis
        working-directory: ./packages/${{ matrix.framework.package }}
        run: npx @e18e/cli@0.5.0 analyze --json > e18e-stats.json || true

      - name: Upload e18e stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e18e-stats-${{ matrix.framework.name }}
          path: packages/${{ matrix.framework.package }}/e18e-stats.json
          retention-days: 1
          if-no-files-found: error

  measure-client-side-rendered:
    if: inputs.client-side-rendered-matrix != '[]'
    runs-on: depot-ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.49.0-noble
      options: --ipc=host
    strategy:
      fail-fast: false
      matrix:
        framework: ${{ fromJson(inputs.client-side-rendered-matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install package dependencies
        working-directory: ./packages/${{ matrix.framework.package }}
        run: pnpm install --frozen-lockfile

      - name: Build app
        working-directory: ./packages/${{ matrix.framework.package }}
        run: pnpm build
        env:
          BUILD_MODE: spa

      - name: Run client-side rendered benchmark
        run: pnpm --filter @framework-tracker/stats-generator run:client-side-rendered ${{ matrix.framework.package }}
        env:
          PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          RUNNER_LABEL: ubuntu-latest

      - name: Upload client-side rendered stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-side-rendered-stats-${{ matrix.framework.name }}
          path: packages/${{ matrix.framework.package }}/ci-stats.json
          retention-days: 1
          if-no-files-found: error

  measure-server-side-rendered:
    if: inputs.server-side-rendered-matrix != '[]'
    runs-on: depot-ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.49.0-noble
      options: --ipc=host
    strategy:
      fail-fast: false
      matrix:
        framework: ${{ fromJson(inputs.server-side-rendered-matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install package dependencies
        working-directory: ./packages/${{ matrix.framework.package }}
        run: pnpm install --frozen-lockfile

      - name: Build app
        working-directory: ./packages/${{ matrix.framework.package }}
        run: pnpm build

      - name: Run server-side rendered benchmark
        run: pnpm --filter @framework-tracker/stats-generator run:server-side-rendered ${{ matrix.framework.package }}
        env:
          PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          RUNNER_LABEL: ubuntu-latest

      - name: Upload server-side rendered stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-side-rendered-stats-${{ matrix.framework.name }}
          path: packages/${{ matrix.framework.package }}/ci-stats.json
          retention-days: 1
          if-no-files-found: error
